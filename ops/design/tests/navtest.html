<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>navtest</title></head>
<body>
<pre id="out">running…</pre>
<iframe id="f" src="/index.html?app=1" width="420" height="800"></iframe>
<script>
var results = [];
function assertScreen(doc, id, label){
  var active = doc.querySelector(".screen.active");
  var ok = active && active.id === id;
  results.push((ok ? "PASS" : "FAIL") + " " + label + " → " + (active ? active.id : "none") + (ok ? "" : " (expected " + id + ")"));
  return ok;
}
function click(doc, sel){
  var el = doc.querySelector(sel);
  if (!el) { results.push("FAIL click: missing " + sel); return; }
  el.click();
}
document.getElementById("f").addEventListener("load", function(){
  var doc = this.contentDocument;
  setTimeout(function(){
    assertScreen(doc, "s-disclaimer", "載入自動推進");
    click(doc, '[data-go="s-gap"]');           assertScreen(doc, "s-gap", "免責→缺口引導");
    click(doc, '[data-go="s-goal"]');          assertScreen(doc, "s-goal", "引導→目標");
    var wr = doc.getElementById("wishRange");
    results.push((wr && wr.value === "60" ? "PASS" : "FAIL") + " 目標頁「希望幾歲前退休」輸入存在且預設 60");
    click(doc, '[data-go="s-invest"]');        assertScreen(doc, "s-invest", "目標→投入");
    click(doc, '[data-go="s-target"]');        assertScreen(doc, "s-target", "投入→標的");
    click(doc, "#pickStock");
    click(doc, "#startCalc");                  assertScreen(doc, "s-result-stock", "個股→確定性結果");
    var tabbarVisible = doc.querySelector(".tabbar").style.display !== "none";
    results.push((tabbarVisible ? "PASS" : "FAIL") + " tabbar 在結果頁顯示");
    /* a11y:tabbar 是畫面間導覽,應為 nav 語意而非 tablist */
    var tbEl = doc.querySelector(".tabbar");
    results.push((tbEl.tagName === "NAV" && !tbEl.hasAttribute("role") ? "PASS" : "FAIL") + " tabbar 為 <nav> 導覽(非 tablist)");
    /* 個股報酬假設可調(Question 2:假設由使用者擁有,引擎 solveMonths 重算) */
    var sa0 = doc.getElementById("stockAge").textContent;
    var sr = doc.getElementById("stockRetRange");
    sr.value = 2; sr.dispatchEvent(new Event("input", {bubbles: true}));
    results.push((doc.getElementById("stockAge").textContent !== sa0 ? "PASS" : "FAIL") + " 個股報酬假設 6%→2% → 達標年齡重算");
    sr.value = 6; sr.dispatchEvent(new Event("input", {bubbles: true}));
    /* 個股頁就地提醒(目標頁承諾的落地):預設達標 69 歲 > 希望 60 歲 → 顯示;希望 ≥ 達標 → 隱藏 */
    var swn = doc.getElementById("stockWishNotice");
    var swt = doc.getElementById("stockWishText");
    var swOk = swn && !swn.hidden && swt.textContent.indexOf("69") >= 0 && swt.textContent.indexOf("60") >= 0;
    results.push((swOk ? "PASS" : "FAIL") + " 個股提醒:預設 69 歲 > 希望 60 歲 → 就地顯示(含兩數字)");
    wr.value = 75; wr.dispatchEvent(new Event("input", {bubbles: true}));
    results.push((swn.hidden ? "PASS" : "FAIL") + " 個股提醒:希望 75 歲 ≥ 達標 69 歲 → 隱藏");
    wr.value = 60; wr.dispatchEvent(new Event("input", {bubbles: true}));
    click(doc, '.tabbar [data-tab="track"]');  assertScreen(doc, "s-track", "tab→追蹤");
    click(doc, '.tabbar [data-tab="settings"]'); assertScreen(doc, "s-settings", "tab→設定");
    click(doc, '.tabbar [data-tab="calc"]');   assertScreen(doc, "s-result-etf", "tab→試算(ETF)");
    var curOk = doc.querySelector('.tabbar [data-tab="calc"]').getAttribute("aria-current") === "page"
      && !doc.querySelector('.tabbar [data-tab="track"]').hasAttribute("aria-current");
    results.push((curOk ? "PASS" : "FAIL") + " tabbar 當前頁 aria-current=\"page\"、其餘無屬性");
    /* wishAge 提醒:預設 60(黃金值 58≤60)不顯示;簡單模式也要能看見並可達 s-fail */
    var wn = doc.getElementById("wishNotice");
    var wnHidden = wn.hidden && doc.defaultView.getComputedStyle(wn).display === "none";
    results.push((wnHidden ? "PASS" : "FAIL") + " 預設情境(P50 58 ≤ 希望 60)不顯示提醒(rendered state)");
    wr.value = 55; wr.dispatchEvent(new Event("input", {bubbles: true}));
    results.push((!wn.hidden ? "PASS" : "FAIL") + " 希望 55 歲(<P50)→ 簡單模式就地顯示提醒");
    click(doc, "#wishNoticeGo");               assertScreen(doc, "s-fail", "提醒連結→無法達標(簡單模式)");
    var faOk = doc.getElementById("failAge").textContent.indexOf("55") >= 0 && doc.getElementById("failDemoNote").hidden;
    results.push((faOk ? "PASS" : "FAIL") + " 無法達標頁反映使用者選的 55 歲(真實缺口,非示範狀態)");
    click(doc, '#s-fail [data-go="s-invest"]'); assertScreen(doc, "s-invest", "無法達標→調整計畫");
    wr.value = 60; wr.dispatchEvent(new Event("input", {bubbles: true}));
    /* s-fail 預設(可達標)入口:明標示範狀態,不顯示自相矛盾的「差 0 萬」宣判 */
    click(doc, 'nav.screens ol li:nth-child(9) button'); assertScreen(doc, "s-fail", "側欄→無法達標(可達標情境)");
    var dn = doc.getElementById("failDemoNote");
    var dnOk = dn && !dn.hidden && dn.textContent.indexOf("示範狀態") >= 0 && dn.textContent.indexOf("60 歲前可達標") >= 0;
    results.push((dnOk ? "PASS" : "FAIL") + " 預設達標情境 → 示範狀態標示(假設年齡+60 歲前可達標)");
    click(doc, '.tabbar [data-tab="calc"]');   assertScreen(doc, "s-result-etf", "tab→試算(回結果頁)");
    click(doc, "#modeAdv"); /* 切到進階模式 */
    var adv = doc.getElementById("advRange");
    adv.value = 6000;
    adv.dispatchEvent(new Event("input", {bubbles: true}));
    adv.dispatchEvent(new Event("change", {bubbles: true}));
    assertScreen(doc, "s-result-etf", "投入過低不自動跳頁(WCAG 3.2.2)");
    results.push((!wn.hidden ? "PASS" : "FAIL") + " 低投入→進階模式就地顯示提醒");
    /* a11y:滑桿 change 後,SR 摘要 live region 反映定值(input 不轟炸) */
    var lr = doc.getElementById("liveResult");
    results.push((lr && lr.getAttribute("aria-live") === "polite" && lr.textContent.indexOf("P50") >= 0 ? "PASS" : "FAIL")
      + " aria-live 結果摘要於 change 後更新");
    click(doc, "#wishNoticeGo");               assertScreen(doc, "s-fail", "提醒連結→無法達標(進階模式)");
    click(doc, '#s-fail [data-go="s-invest"]'); assertScreen(doc, "s-invest", "無法達標→調整計畫");
    /* v0.8 新畫面與動態接線 */
    click(doc, '.tabbar [data-tab="ledger"]');  assertScreen(doc, "s-ledger", "tab→帳本");
    var adOk = doc.getElementById("lgAutoDiv") && doc.getElementById("lgAutoDiv").textContent.indexOf("除息") >= 0;
    results.push((adOk ? "PASS" : "FAIL") + " 配息自動生成示意已渲染");
    click(doc, '.tabbar [data-tab="calc"]');    assertScreen(doc, "s-result-etf", "tab→試算");
    click(doc, '#s-result-etf [data-go="s-method"]'); assertScreen(doc, "s-method", "結果→方法揭露");
    var ge = doc.getElementById("gapExpense");
    ge.value = 100000; ge.dispatchEvent(new Event("input", {bubbles: true}));
    var tOk = doc.getElementById("goalTarget").textContent.indexOf("21,750,000") >= 0;
    results.push((tOk ? "PASS" : "FAIL") + " 缺口輸入→目標動態重算(gap.ts)");
    ge.value = 77500; ge.dispatchEvent(new Event("input", {bubbles: true}));
    var cmpOk = doc.getElementById("cmpTable") && doc.getElementById("cmpTable").textContent.indexOf("P50") >= 0;
    results.push((cmpOk ? "PASS" : "FAIL") + " 標的比較引擎數字已渲染");
    var dcOk = doc.getElementById("decumHero") && doc.getElementById("decumHero").textContent.indexOf("—") < 0;
    results.push((dcOk ? "PASS" : "FAIL") + " 提領期引擎數字已渲染");
    /* 持股輸入 → 已累積資產連動(F-12 進度整合) */
    click(doc, "#assetLedger");
    var avLedger = doc.getElementById("assetVal").textContent;
    results.push((avLedger.indexOf("800,000") < 0 ? "PASS" : "FAIL") + " 已累積資產→帳本市值連動");
    doc.getElementById("holdShares").value = 1000;
    doc.getElementById("holdCost").value = 100;
    doc.getElementById("holdPrice").value = 132;
    click(doc, "#holdAdd");
    var avAfter = doc.getElementById("assetVal").textContent;
    results.push((avAfter !== avLedger ? "PASS" : "FAIL") + " 新增持股→試算起點重算");
    click(doc, "#assetManual");
    /* 持股明細:配置列點入 → 調整 → 返回 */
    click(doc, '.tabbar [data-tab="ledger"]');
    click(doc, '#lgHoldings .holding-row');        assertScreen(doc, "s-holding", "配置列→持股明細");
    var hv0 = doc.getElementById("hdValue").textContent;
    doc.getElementById("hdPrice").value = 999;
    click(doc, "#hdApply");
    results.push((doc.getElementById("hdValue").textContent !== hv0 ? "PASS" : "FAIL") + " 明細調整現價→市值重算");
    doc.getElementById("hdPrice").value = 132;
    click(doc, "#hdApply"); /* 還原現價 */
    click(doc, '#s-holding [data-go="s-ledger"]'); assertScreen(doc, "s-ledger", "明細→返回帳本");
    /* 再審視修復:追蹤頁=帳本市值、比較頁自結果頁可達、調升滑桿接引擎 */
    click(doc, '.tabbar [data-tab="track"]');      assertScreen(doc, "s-track", "tab→追蹤");
    var tvOk = doc.getElementById("trackVal").textContent === doc.getElementById("lgValue").textContent;
    results.push((tvOk ? "PASS" : "FAIL") + " 追蹤頁進度=帳本市值(單一真相)");
    click(doc, '.tabbar [data-tab="calc"]');
    click(doc, '#s-result-etf [data-go="s-compare"]'); assertScreen(doc, "s-compare", "結果→標的比較");
    click(doc, '#s-compare [data-go="s-result-etf"]'); assertScreen(doc, "s-result-etf", "比較→返回試算");
    var hero0 = doc.getElementById("etfHero").textContent;
    var rr = doc.getElementById("raiseRange");
    rr.value = 10; rr.dispatchEvent(new Event("input", {bubbles: true}));
    var heroUp = doc.getElementById("etfHero").textContent;
    results.push((heroUp !== hero0 ? "PASS" : "FAIL") + " 調升滑桿→引擎重算(F-02)");
    rr.value = 0; rr.dispatchEvent(new Event("input", {bubbles: true}));
    /* 漸進揭露:摺疊預設收合、摺疊內控制仍連動 */
    var folds = doc.querySelectorAll("details.fold");
    var allClosed = folds.length >= 5 && Array.prototype.every.call(folds, function(f){ return !f.open; });
    results.push((allClosed ? "PASS" : "FAIL") + " 摺疊預設收合(" + folds.length + " 個)");
    var lb = doc.getElementById("gapLaobao");
    lb.value = 28000; lb.dispatchEvent(new Event("input", {bubbles: true}));
    var lbOk = doc.getElementById("goalTarget").textContent.indexOf("15,000,000") < 0;
    lb.value = 18000; lb.dispatchEvent(new Event("input", {bubbles: true}));
    results.push((lbOk ? "PASS" : "FAIL") + " 摺疊內勞保滑桿→目標連動");
    /* 目標雙模式:直接設定金額(F-01 可覆寫) */
    click(doc, "#modeDirect");
    var tr = doc.getElementById("targetRange");
    tr.value = 30000000; tr.dispatchEvent(new Event("input", {bubbles: true}));
    var dOk = doc.getElementById("goalTarget").textContent.indexOf("30,000,000") >= 0;
    results.push((dOk ? "PASS" : "FAIL") + " 直接設定金額→全下游改用該目標");
    click(doc, "#modeGap");
    var backOk = doc.getElementById("goalTarget").textContent.indexOf("15,000,000") >= 0;
    results.push((backOk ? "PASS" : "FAIL") + " 切回現金流推算→目標還原");
    var pass = results.filter(function(r){ return r.indexOf("FAIL") === 0; }).length === 0;
    document.getElementById("out").textContent =
      "NAVTEST " + (pass ? "ALL-PASS" : "HAS-FAIL") + "\n" + results.join("\n");
  }, 2000);
});
</script>
</body>
</html>
